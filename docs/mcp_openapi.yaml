openapi: 3.1.0
info:
  title: Algo Trading API MCP (JSON-RPC over HTTP)
  version: "1.0.0"
  description: >
    MCP server for TradingView analysis/execution workflows.
    Endpoints are JSON-RPC 2.0 over HTTP POST.

servers:
  - url: http://localhost:5002
    description: Local dev (replace with your deployed base URL)

security:
  - bearerAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: "token"

  schemas:
    JsonRpcId:
      description: JSON-RPC id (number or string). Can be omitted for notifications.
      oneOf:
        - type: integer
        - type: string

    JsonRpcError:
      type: object
      required: [code, message]
      properties:
        code:
          type: integer
          description: Application-defined error code
        message:
          type: string
        data:
          type: object
          nullable: true

    JsonRpcErrorResponse:
      type: object
      required: [jsonrpc, error]
      properties:
        jsonrpc:
          type: string
          example: "2.0"
          enum: ["2.0"]
        id:
          nullable: true
          oneOf:
            - type: integer
            - type: string
        error:
          $ref: "#/components/schemas/JsonRpcError"

    JsonRpcRequest:
      type: object
      required: [jsonrpc, method]
      properties:
        jsonrpc:
          type: string
          enum: ["2.0"]
        id:
          $ref: "#/components/schemas/JsonRpcId"
        method:
          type: string
          description: MCP method (initialize, tools/list, tools/call, notifications/initialized)
        params:
          type: object
          additionalProperties: true
          description: Method-specific parameters

    ToolListResponse:
      type: object
      required: [jsonrpc, id, result]
      properties:
        jsonrpc:
          type: string
          enum: ["2.0"]
        id:
          nullable: false
          oneOf:
            - type: integer
            - type: string
        result:
          type: object
          required: [tools]
          properties:
            tools:
              type: array
              items:
                $ref: "#/components/schemas/ToolDefinition"

    ToolDefinition:
      type: object
      required: [name, title, description, inputSchema]
      properties:
        name:
          type: string
        title:
          type: string
        description:
          type: string
        inputSchema:
          type: object
          additionalProperties: true

    InitializeResponse:
      type: object
      required: [jsonrpc, id, result]
      properties:
        jsonrpc:
          type: string
          enum: ["2.0"]
        id:
          oneOf:
            - type: integer
            - type: string
          nullable: false
        result:
          type: object
          required: [protocolVersion, capabilities, serverInfo]
          properties:
            protocolVersion:
              type: string
            capabilities:
              type: object
              additionalProperties: true
            serverInfo:
              type: object
              additionalProperties: true

    ToolCallToolContent:
      type: object
      required: [type, text]
      properties:
        type:
          type: string
          enum: ["text"]
        text:
          type: string
          description: Text payload (often JSON string)

    ToolCallResponse:
      type: object
      required: [jsonrpc, id, result]
      properties:
        jsonrpc:
          type: string
          enum: ["2.0"]
        id:
          oneOf:
            - type: integer
            - type: string
          nullable: false
        result:
          type: object
          required: [content, isError]
          properties:
            structuredContent:
              type: object
              additionalProperties: true
              description: Machine-friendly structured result when available
            content:
              type: array
              items:
                $ref: "#/components/schemas/ToolCallToolContent"
            isError:
              type: boolean

    NotificationOk:
      type: object
      description: For notifications (no id), server returns 200 with empty body.
      nullable: true
      properties: {}
      additionalProperties: true

paths:
  /mcp:
    post:
      operationId: mcpPost
      summary: MCP JSON-RPC entrypoint (production tools)
      description: >
        Send JSON-RPC 2.0 requests to discover tools and execute them.
        Authentication is required.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JsonRpcRequest"
      responses:
        "200":
          description: OK (tool list / tool call / initialize; or empty for notifications)
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/ToolListResponse"
                  - $ref: "#/components/schemas/ToolCallResponse"
                  - $ref: "#/components/schemas/InitializeResponse"
                  - $ref: "#/components/schemas/NotificationOk"
        "400":
          description: Parse error or missing body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JsonRpcErrorResponse"
        "401":
          description: Unauthorized (missing/invalid bearer token)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JsonRpcErrorResponse"
        "503":
          description: Service Unavailable (MCP_ACCESS_TOKEN not configured)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JsonRpcErrorResponse"
        "413":
          description: Payload Too Large (max 1MB)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JsonRpcErrorResponse"

  /mcp/debug:
    post:
      operationId: mcpDebugPost
      summary: MCP JSON-RPC debug entrypoint (debug-only tools)
      description: >
        Same as `/mcp`, but uses the debug tool registry.
        Debug authentication precedence: `MCP_DEBUG_TOKEN` (if set) else fallback to `MCP_ACCESS_TOKEN`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JsonRpcRequest"
      responses:
        "200":
          description: OK (debug tool list / tool call / initialize; or empty for notifications)
        "400":
          description: Parse error or missing body
        "401":
          description: Unauthorized (missing/invalid bearer token)
        "503":
          description: Service Unavailable (MCP_DEBUG_TOKEN and/or MCP_ACCESS_TOKEN not configured)
        "413":
          description: Payload Too Large (max 1MB)

